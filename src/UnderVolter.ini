; ==============================================================================
; UnderVolter Configuration File
; ==============================================================================
; Global settings apply to all profiles unless overridden.
; Power is in milliWatts (mW), Time is in milliseconds (ms).
; Use MAX_POWAH (4294967295) for unlimited.
;
; SAFE VALUES: All offset values below include a 20% safety margin based on
; community-reported stable values from Overclock.net, TechPowerUp, Reddit, etc.
; Individual chip stability varies - test thoroughly before daily use.
; VF points (optional): VF_Point_<n>_<DOMAIN> = <Freq_MHz> : <Offset_mV>
; ==============================================================================

; ==============================================================================
; UEFI NVRAM Setup Variable Patches
; ==============================================================================
; Patches the hidden BIOS "Setup" EFI variable before CPU programming.
; This is equivalent to running grub-mod setup_var / RU.efi from a shell.
;
; IMPORTANT: Changes take effect on the NEXT BOOT only.
;   The BIOS reads this variable during POST to decide which hardware features
;   to lock.  Writing here does NOT affect the current session — lock bits
;   already set by this boot's POST remain set until the next power cycle.
;
; How to use:
;   1. Set NvramPatchEnabled = 1
;   2. Set NvramPatchReboot = 1 (recommended) or 0 (manual reboot later)
;   3. Run UnderVolter.efi once — it patches NVRAM and reboots
;   4. After reboot the locks are cleared; UnderVolter can now program MSRs
;   5. Set NvramPatchEnabled = 0 again (patches are persistent in NVRAM)
;
; Offsets confirmed from IFR dump of Dell XPS 7590 BIOS v1.35 (latest and older)
; (VarStore 0x1, GUID EC87D643-EBA4-4BB5-A1E5-3F3E36B20DA9, size 0x17FD):
;   0x6ED = CFG Lock      (1=locked, 0=unlocked) — blocks MSR 0xE2 writes
;   0x789 = OC Lock       (1=locked, 0=unlocked) — blocks MSR 0x150 OC Mailbox
;
; Format: Patch_N = 0xOFFSET : 0xVALUE   (up to 16 entries, N is arbitrary)
; ==============================================================================
[SetupVar]
; Set to 1 to enable patching on next run (set back to 0 after first successful reboot)
NvramPatchEnabled = 1

; Reboot immediately after patching (recommended — patches need a full POST cycle)
NvramPatchReboot = 1

; Note: These are the author's laptop settings:
; For all Dell XPS 7590 BIOS versions
Patch_0 = 0x6ED : 0x00
Patch_1 = 0x789 : 0x00

; ==============================================================================
; Secure Boot Key Enrollment
; ==============================================================================
; Self-enrollment: computes SHA-256 of the running UnderVolter.efi image and
; appends it to the Secure Boot "db" variable, so that the next POST accepts
; the binary as trusted without a separate certificate or signing tool.
;
; IMPORTANT: Requires Secure Boot Setup Mode (PK not yet enrolled).
;   In Setup Mode unauthenticated db writes are accepted by firmware.
;   After self-enrollment you must enroll a PK (Platform Key) to exit
;   Setup Mode — Secure Boot then becomes active and the hash is trusted.
;
; Typical one-time workflow:
;   1. Enter BIOS Setup → clear/delete PK → enter Setup Mode → save & reboot
;   2. Set SelfEnroll = 1 below, run UnderVolter.efi
;   3. Firmware reboots (SelfEnrollReboot = 1) — hash is now in db
;   4. Enter BIOS Setup → enroll your PK → Secure Boot enabled
;   5. Set SelfEnroll = 0 (enrollment is persistent in NVRAM)
;
; .auth file enrollment (advanced):
;   KeyDir = path to folder on ESP containing PK.auth, KEK.auth, db.auth, dbx.auth
;   Leave empty to skip .auth file enrollment.
;   Enabled = 1 activates .auth enrollment (separate from SelfEnroll).
; ==============================================================================
[SecureBoot]
; Set to 1 to append SHA-256 of this EFI image into Secure Boot db
SelfEnroll = 1

; Reboot immediately after db update (recommended — takes effect on next POST)
SelfEnrollReboot = 1

; .auth file enrollment — set SecureBootEnroll = 1 and point KeyDir to your .auth files
SecureBootEnroll = 0
KeyDir =

; After enrollment attempt the standard UEFI 2.5+ Audit→Deployed Mode transition.
; Writes DeployedMode=1 to EFI global variable — no authentication needed from Audit Mode.
; Non-fatal: if firmware rejects it (e.g. Dell custom behaviour), falls through gracefully.
; Set to 0 if your firmware ignores it and you prefer to switch manually in BIOS.
TryDeployedMode = 1

; After enrollment, ask whether to boot directly to BIOS/firmware UI on next reset.
; Y = system reboots into BIOS Setup (same as Windows Shift+Restart → UEFI Firmware Settings)
; N or timeout = normal reboot
BootToFirmwareUI = 1
BootToFirmwareUITimeout = 5

; ==============================================================================
[Global]
ProgramPowerTweaks = 1
EnableEETurbo = 1
EnableRaceToHalt = 1
MaxCTDPLevel = 0
TdpControlLock = 1

; Display Settings
; DelaySeconds: Wait X seconds before exiting (useful for reading output on real hardware).
DelaySeconds = 3
; QuietMode: If 1, hides UI and animations, applying settings silently.
QuietMode = 0

; Firmware Behavior Flags (global)
PostProgrammingOcLock = 1
EmergencyExit = 1
EnableSaferAsm = 1
DisableFirmwareWDT = 0
SelfTestMaxRuns = 0
PrintPackageConfig = 1
PrintVFPoints_PostProgram = 1

; ==============================================================================
; CPU Profiles - Ordered from newest to oldest generation
; ==============================================================================

; ------------------------------------------------------------------------------
; ARL - Arrow Lake (Core Ultra 200S/HX, 15th Gen Desktop/Mobile HX, 2024)
; CPUID: 6, 197, * (ARL-S desktop, Core Ultra 200S)
;        6, 198, * (ARL-HX mobile)
; NOTE: disaggregated tile architecture — compute/SoC/IO tiles are separate.
;       MSR 0x150 / OC Mailbox voltage offset interface is still present on ARL-S.
;       Voltage domains map to compute tile (P-Core, E-Core, Ring) only;
;       SoC tile (GT, Uncore) has separate VR outside traditional FIVR scope.
;       0mV safe defaults until community data matures.
; NOTE: Lunar Lake (Core Ultra 200V, 15th gen laptop) uses embedded power
;       delivery (ePD) — traditional MSR 0x150 offset does NOT apply. No profile.
; ------------------------------------------------------------------------------
[Profile.ArrowLake]
Architecture = "ArrowLake"

; IccMax (in 1/4 A units, 65535 = MAX)
IccMax_IACORE = 65535
IccMax_RING = 65535
IccMax_UNCORE = 65535
IccMax_ECORE = 65535
IccMax_GTSLICE = 0
IccMax_GTUNSLICE = 0

; SAFE VALUES with 20% margin (community reports: -15 to -65mV core/cache when unlocked)
; NOTE: Many OEM BIOSes lock undervolting on Core Ultra; if locked, these won't apply.
; FIVR per-domain architecture - SoC/GT domains may be on separate rails.
OffsetVolts_IACORE = -30
OffsetVolts_RING = -20
OffsetVolts_ECORE = -30
OffsetVolts_UNCORE = 0
OffsetVolts_GTSLICE = 0
OffsetVolts_GTUNSLICE = 0

; ------------------------------------------------------------------------------
; MTL - Meteor Lake (Core Ultra 100/200 H/U, 14th Gen Laptop, 2023-2024)
; CPUID: 6, 170, * (MTL-M/P — Core Ultra 1xx H/U, primary laptop variant)
; NOTE: MTL-S (desktop) was cancelled; only laptop variant shipped to consumers.
;       Uses FIVR per-domain but tile architecture differs from ADL/RPL.
;       P-Core tile, E-Core tile, SoC tile each have independent voltage rails.
;       Voltage offset via MSR 0x150 reported to work on MTL-M/P with caveats.
;       0mV safe defaults — community data still limited.
; ------------------------------------------------------------------------------
[Profile.MeteorLake]
Architecture = "MeteorLake"

; IccMax (in 1/4 A units, 65535 = MAX)
IccMax_IACORE = 65535
IccMax_RING = 65535
IccMax_UNCORE = 65535
IccMax_ECORE = 65535
IccMax_GTSLICE = 0
IccMax_GTUNSLICE = 0

; SAFE VALUES with 20% margin (community reports: -15 to -65mV core/cache when unlocked)
; NOTE: Many OEM BIOSes lock undervolting on Core Ultra; if locked, these won't apply.
; Meteor Lake uses FIVR per-domain; SoC/GT domains may be on separate rails.
OffsetVolts_IACORE = -30
OffsetVolts_RING = -20
OffsetVolts_ECORE = -30
OffsetVolts_UNCORE = 0
OffsetVolts_GTSLICE = 0
OffsetVolts_GTUNSLICE = 0

; ------------------------------------------------------------------------------
; RPL - Raptor Lake (13th/14th Gen)
; CPUID: 6, 183, * / 6, 186, * / 6, 191, *
; Example: i9-14900K, i7-14700K, i5-14600K, i9-13900K, i7-13700K
; SAFE VALUES with 20% margin (community reports: -100 to -150mV typical)
; ------------------------------------------------------------------------------
[Profile.RaptorLake]
Architecture = "RaptorLake"
ForcedRatioForPCoreCounts = 0
ForcedRatioForECoreCounts = 0

; IccMax (in 1/4 A units, 65535 = MAX)
IccMax_IACORE = 65535
IccMax_RING = 65535
IccMax_UNCORE = 65535
IccMax_ECORE = 65535
IccMax_GTSLICE = 0
IccMax_GTUNSLICE = 0

; Safe offsets with 20% margin (P-Cores, E-Cores share voltage with Ring)
; Community stable: -100 to -150mV | Safe with margin: -80mV / -60mV
; NOTE: On hybrid CPUs, P-Core/Ring/E-Core often share rails.
;       Keep OffsetVolts_IACORE/RING/ECORE close (ideally within ~20-30mV).
OffsetVolts_IACORE = -80
OffsetVolts_RING = -60
OffsetVolts_ECORE = -80
OffsetVolts_UNCORE = -50
OffsetVolts_GTSLICE = -40
OffsetVolts_GTUNSLICE = -40

; ------------------------------------------------------------------------------
; ADL - Alder Lake (12th Gen)
; CPUID: 6, 151, * / 6, 154, *
; Example: i9-12900K, i7-12700K, i5-12600K
; SAFE VALUES with 20% margin (community reports: -100 to -150mV typical)
; ------------------------------------------------------------------------------
[Profile.AlderLake]
Architecture = "AlderLake"
ForcedRatioForPCoreCounts = 0
ForcedRatioForECoreCounts = 0

; IccMax (in 1/4 A units, 65535 = MAX)
IccMax_IACORE = 65535
IccMax_RING = 65535
IccMax_UNCORE = 65535
IccMax_ECORE = 65535
IccMax_GTSLICE = 0
IccMax_GTUNSLICE = 0

; Safe offsets with 20% margin (P-Cores, E-Cores, Ring share voltage)
; Community stable: -100 to -150mV | Safe with margin: -80mV / -60mV
; NOTE: On hybrid CPUs, P-Core/Ring/E-Core often share rails.
;       Keep OffsetVolts_IACORE/RING/ECORE close (ideally within ~20-30mV).
OffsetVolts_IACORE = -80
OffsetVolts_RING = -60
OffsetVolts_ECORE = -80
OffsetVolts_UNCORE = -50
OffsetVolts_GTSLICE = -40
OffsetVolts_GTUNSLICE = -40

; ------------------------------------------------------------------------------
; RKL - Rocket Lake (11th Gen Desktop)
; CPUID: 6, 167, *
; Example: i9-11900K, i7-11700K, i5-11600K (B0 Stepping)
; SAFE VALUES with 20% margin (community reports: -100 to -140mV typical)
; ------------------------------------------------------------------------------
[Profile.RocketLake]
Architecture = "RocketLake"

; Power Limits - Unlimited (safe for well-cooled systems)
ProgramPL12_MSR = 1
MsrPkgPL1_Power = 4294967295
MsrPkgPL2_Power = 4294967295
LockMsrPkgPL12 = 0

; IccMax (in 1/4 A units, 65535 = MAX)
IccMax_IACORE = 65535
IccMax_RING = 65535
IccMax_UNCORE = 65535
IccMax_GTSLICE = 0
IccMax_GTUNSLICE = 0

; Safe offsets with 20% margin
; Community stable: -100 to -140mV | Safe with margin: -80mV / -60mV
OffsetVolts_IACORE = -80
OffsetVolts_RING = -60
OffsetVolts_GTSLICE = -40
OffsetVolts_GTUNSLICE = -40
OffsetVolts_UNCORE = -50

; ------------------------------------------------------------------------------
; TGL - Tiger Lake (11th Gen Laptop)
; CPUID: 6, 140, * (TGL-U, 15W — i3/i5/i7-11xxG7)
;        6, 141, * (TGL-H, 35-45W — i7/i9-11xxxH, HK)
; Example: i7-1185G7, i7-1165G7, i5-1135G7, i7-11800H, i9-11900H
; SAFE VALUES with 20% margin (community reports: -80 to -120mV typical)
; NOTE: Tiger Lake has FIVR with separate P-Core, Ring, GT, Uncore domains.
;       E-Core domain not present (no hybrid on TGL — all Willow Cove P-Cores).
;       GT Slice and Unslice respond to voltage offsets similarly to Skylake gen.
; ------------------------------------------------------------------------------
[Profile.TigerLake]
Architecture = "TigerLake"

; IccMax (in 1/4 A units, 65535 = MAX)
IccMax_IACORE   = 65535
IccMax_RING     = 65535
IccMax_UNCORE   = 65535
IccMax_GTSLICE  = 0
IccMax_GTUNSLICE = 0

; Safe offsets with 20% margin
; Community stable: -80 to -120mV P-Core | -60 to -80mV Ring
OffsetVolts_IACORE   = -80
OffsetVolts_RING     = -60
OffsetVolts_UNCORE   = -50
OffsetVolts_GTSLICE  = -40
OffsetVolts_GTUNSLICE = -40

